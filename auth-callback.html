<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirming your account — Resonance</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
    }

    .callback-card {
      text-align: center;
      padding: 48px 40px;
      background: white;
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-lg);
      max-width: 420px;
      width: 100%;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--color-border);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    #status-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 8px;
    }

    #status-msg {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="callback-card">
  <div class="spinner" id="spinner"></div>
  <div class="status-icon" id="status-icon" style="display:none;"></div>
  <div id="status-title">Confirming your account…</div>
  <div id="status-msg">Just a moment while we verify your email.</div>
</div>

<script>
  async function handleCallback() {
    // Supabase puts the tokens in the URL hash on email confirmation
    // The client picks them up automatically via getSession()
    const { data: { session }, error } = await _supabase.auth.getSession();

    if (error || !session) {
      // Try exchanging the code/token from the hash manually
      const hash = window.location.hash;
      const params = new URLSearchParams(hash.replace('#', '?'));
      const accessToken  = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const type         = params.get('type');

      if (accessToken) {
        const { data, error: setErr } = await _supabase.auth.setSession({
          access_token:  accessToken,
          refresh_token: refreshToken
        });

        if (setErr || !data.session) {
          showError('This confirmation link has expired or already been used. Please <a href="login.html">sign in</a> or request a new link.');
          return;
        }

        await redirectUser(data.session.user);
        return;
      }

      showError('Invalid confirmation link. Please <a href="login.html">return to sign in</a>.');
      return;
    }

    await redirectUser(session.user);
  }

  async function redirectUser(user) {
    // Fetch role from profile
    const { data: profile } = await _supabase
      .from('profiles')
      .select('role')
      .eq('id', user.id)
      .single();

    const role = profile?.role || 'founder';

    showSuccess(role);
    setTimeout(() => {
      window.location.href = role === 'investor' ? 'investor-feed.html' : 'founder-dashboard.html';
    }, 1500);
  }

  function showSuccess(role) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status-icon').style.display = 'block';
    document.getElementById('status-icon').textContent = '✅';
    document.getElementById('status-title').textContent = 'Email confirmed!';
    document.getElementById('status-msg').textContent =
      `Welcome to Resonance. Taking you to your ${role === 'investor' ? 'deal feed' : 'dashboard'}…`;
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status-icon').style.display = 'block';
    document.getElementById('status-icon').textContent = '⚠️';
    document.getElementById('status-title').textContent = 'Something went wrong';
    document.getElementById('status-msg').innerHTML = msg;
  }

  handleCallback();
</script>
</body>
</html>
